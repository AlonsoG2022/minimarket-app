spring.application.name=minimarket-print-worker-java

spring.datasource.url=jdbc:sqlserver://localhost;databaseName=MinimarketDb;encrypt=true;trustServerCertificate=true
spring.datasource.username=minimarket_user
spring.datasource.password=Minimarket123!
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.show-sql=false

printing.poll-ms=5000
printing.printer-name=
printing.business-name=Minimarket
printing.legal-name=Minimarket Casa
printing.tax-id=RUC por definir
printing.address-line=Direccion por definir
printing.phone=Telefono por definir
printing.customer-label=Consumidor final
printing.footer-line1=Gracias por su compra
printing.footer-line2=Vuelva pronto
printing.line-width=42

logging.level.root=INFO
