spring.application.name=minimarket-api-java
server.port=5214

spring.datasource.url=jdbc:sqlserver://localhost:55320;databaseName=MinimarketDb;encrypt=true;trustServerCertificate=true
spring.datasource.username=minimarket_user
spring.datasource.password=Minimarket123!
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver


spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.show-sql=false
spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=false

logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=WARN
